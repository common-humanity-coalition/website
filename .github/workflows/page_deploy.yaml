# Build the Astro website AND the incident database (as a subdirectory) and
# deploy both to GitHub Pages in a single artifact:
#   - website  -> /            (commonhumanity.us)
#   - database -> /incidents/  (commonhumanity.us/incidents/)
on:
  push:
    branches: production
  # pull_request:
  workflow_dispatch:

name: Deploy site

permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: website-deploy
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # --- Root website -> dist/ -------------------------------------------
      - name: Install website dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      # --- Incident database -> dist/incidents/ ----------------------------
      # The website has no /incidents route of its own, so the database is
      # assembled into dist AFTER the root build with no collision.
      - name: Install incidents-app dependencies
        run: npm ci
        working-directory: incidents-app

      - name: Build incidents-app
        run: npm run build
        working-directory: incidents-app
        env:
          BASE_PATH: /incidents
          SITE_ORIGIN: https://commonhumanity.us

      - name: Assemble incidents into website dist
        run: |
          rm -rf dist/incidents
          mkdir -p dist/incidents
          cp -R incidents-app/dist/. dist/incidents/

      - name: Upload website artifact
        if: ${{ github.ref == 'refs/heads/production' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: "dist"

  deploy:
    needs: build

    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
